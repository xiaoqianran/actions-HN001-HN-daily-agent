name: Daily HN Digest

on:
  schedule:
    # 每天 UTC 时间 22:00 运行 (对应北京时间早上 6:00)
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      hn_top_count:
        description: "HN 抓取数量（可选，默认 15）"
        required: false
      github_top_count:
        description: "GitHub Trending 抓取数量（可选，默认 20）"
        required: false
      summary_prompt_template:
        description: "摘要提示词模板（可选，需包含 {title} 和 {content}）"
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-digest
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 需要历史 data/ 归档
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Show runtime versions
        run: |
          echo "node: $(node -v)"
          echo "python: $(python --version)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Run Agent (fetch + summarize + build site)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || secrets.DEEPSEEK_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://integrate.api.nvidia.com/v1' }}
          MODEL_NAME: ${{ vars.MODEL_NAME || 'stepfun-ai/step-3.5-flash' }}
          HN_TOP_COUNT: ${{ github.event.inputs.hn_top_count || vars.HN_TOP_COUNT || '15' }}
          # GitHub 禁止 Variables 名以 GITHUB_ 开头，故仓库变量用 GH_TOP_COUNT
          GITHUB_TOP_COUNT: ${{ github.event.inputs.github_top_count || vars.GH_TOP_COUNT || '20' }}
          SUMMARY_PROMPT_TEMPLATE: ${{ github.event.inputs.summary_prompt_template || vars.SUMMARY_PROMPT_TEMPLATE }}
        run: python news_agent.py

      - name: Commit digest data and site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data public
          if git diff --staged --quiet; then
            echo "No site changes to commit"
          else
            git commit -m "chore(site): publish digest $(date -u +%F)"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
